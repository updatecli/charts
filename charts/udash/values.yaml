# Default values for udash.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#

# -- Number of replicas for the udash-server and udash-front deployments.
replicaCount: 1

images:
  server:
    # -- Repository for the udash-server image.
    repository: ghcr.io/updatecli/udash
    # -- Image pull policy for the udash-server image.
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: v0.15.0@sha256:4030ba7489e8ec8462028638a3ed92b94ba97deeb13013fd22cd0a11e4e4bd7a
    # -- Command override for the udash-server container.
    command:
      - "udash"
    # -- Arguments for the udash-server container.
    args:
      - "server"
      - "start"
  front:
    # -- Repository for the udash-front image.
    repository: ghcr.io/updatecli/udash-front
    # -- Image pull policy for the udash-front image.
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: v0.20.2@sha256:1bd9a9d2fe5c26a8cdeb6b47366069c1fcd37c99ca48ad40096b777d7cc61e2b

# -- Secrets for pulling images from private registries.
imagePullSecrets: []
# -- Override for the chart name used in resource names.
nameOverride: ""
# -- Full override for the chart name used in resource names.
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template.
  name: ""

configMap:
  # -- The name of the ConfigMap used to store server/front configuration. If not set, a name is generated using the fullname template.
  name: ""
  # -- Annotations to add to the ConfigMap.
  annotations: {}

secrets:
  # -- The name of the Secret used to store credentials. If not set, a name is generated using the fullname template.
  name: ""
  database:
    # -- Annotations to add to the database Secret.
    annotations: {}
    stringdata:
      # -- PostgreSQL connection URI used by the udash-server.
      uri: postgres://postgres:5432/udash?sslmode=disable
  auth:
    # -- Annotations to add to the auth Secret.
    annotations: {}
    stringdata:
      # -- Authentication mode. Supported values: `oauth`, `none`.
      mode: none
      # -- OAuth2 client ID.
      clientid: xxx.example
      # -- OAuth2 audience.
      audience: https://udash.example/api
      # -- OAuth2 issuer URL.
      issuer: https://oauth.example

# -- Annotations to add to all pods.
podAnnotations: {}
# -- Pod-level security context.
podSecurityContext: {}
# fsGroup: 2000

# -- Container-level security context.
securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

ingress:
  # -- Enable Ingress resource creation.
  enabled: false
  # -- IngressClass name (Kubernetes >= 1.18).
  className: ""
  # -- Annotations to add to the front Ingress resource.
  # For subpath routing, add the strip-prefix annotation for your ingress controller.
  # nginx example:
  #   nginx.ingress.kubernetes.io/rewrite-target: /$2
  #   nginx.ingress.kubernetes.io/use-regex: "true"
  # (and set ingress.paths.front to "/updatecli(/|$)(.*)")
  # traefik example (requires a Middleware CR for stripprefix):
  #   traefik.ingress.kubernetes.io/router.middlewares: <namespace>-<middlewarename>@kubernetescrd
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  # -- Ingress host rules for the front. Traffic is forwarded according to ingress.paths.
  hosts:
    - host: udash.local
  # -- TLS configuration for the front Ingress.
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
  paths:
    # -- Path prefix for udash-front on same-host routing.
    # For subpath routing (e.g. "/updatecli"), also set front.appBasePath to the same value
    # and add a strip-prefix annotation so nginx receives "/" instead of "/updatecli/...".
    front: "/"
    # -- Path prefix for udash-server on same-host routing (when ingress.server.host is empty).
    server: "/api"
  server:
    # -- Optional separate hostname for the API server.
    # When empty (default): udash-server is routed via ingress.paths.server on each front host.
    # When set: a second Ingress is created for this host routing to udash-server.
    host: ""
    # -- Path prefix for udash-server on the separate server host.
    path: "/api"
    # -- Annotations to add to the server Ingress resource.
    annotations: {}
    # -- TLS configuration for the server Ingress.
    tls: []
  traefik:
    stripPrefix:
      # -- When true, create Traefik Middleware resources and wire their annotations automatically.
      # Front: a StripPrefix Middleware strips ingress.paths.front (useful when it is not "/").
      # Server: a StripPrefix + AddPrefix Middleware chain rewrites ingress.server.path to
      # ingress.paths.server ("/api") — only rendered when ingress.server.host is set.
      # Example: external /updatecli/* → strip /updatecli → add /api → backend sees /api/*.
      # Requires Traefik CRDs (traefik.io/v1alpha1) to be installed in the cluster.
      enabled: false

front:
  # -- API base URL used by the browser.
  # Use a relative path (e.g. "/api") for same-host routing.
  # Use an absolute URL (e.g. "https://api.domain.example/api") for split-domain routing.
  apiBaseUrl: "/api"
  # -- Base path for the SPA. Must match ingress.paths.front when using subpath routing.
  # Example: set both ingress.paths.front and front.appBasePath to "/updatecli".
  appBasePath: "/"

# -- Resource requests and limits for all containers. Ref: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

autoscaling:
  # -- Enable Horizontal Pod Autoscaler.
  enabled: false
  # -- Minimum number of replicas.
  minReplicas: 1
  # -- Maximum number of replicas.
  maxReplicas: 100
  # -- Target CPU utilization percentage for autoscaling.
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}

service:
  # -- Kubernetes Service type.
  type: ClusterIP
  # -- Service port.
  port: 80

# -- Run the udash-server in read-only / dry-run mode (no authentication required). Set to `false` to enable full OAuth2 authentication.
readonly: true

cnpg:
  # -- Enable CloudNative-PG managed PostgreSQL cluster. When true, the chart provisions a CNPG Cluster and injects credentials automatically. Requires the CNPG operator to be installed separately.
  enabled: true
  # -- Number of PostgreSQL instances in the CNPG cluster.
  instances: 1
  # -- PostgreSQL database name created during cluster bootstrap.
  database: udash
  # -- PostgreSQL role/owner created during cluster bootstrap.
  owner: udash
  storage:
    # -- Storage size for each PostgreSQL instance.
    size: 1Gi
