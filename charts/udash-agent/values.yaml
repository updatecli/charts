# Default values for udash agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#

images:
  agent:
    # -- Repository for the Updatecli agent image.
    repository: ghcr.io/updatecli/updatecli
    # -- Image pull policy for the agent image.
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: v0.118.0@sha256:f5442c61c28948dc16c0520431c5e1263604ff06d795795c64066c48397f9793
    # -- Command override for the agent container.
    command:
      - "updatecli"
    # -- Arguments for the agent container.
    args:
      - "compose"
      - "diff"
      - "--file"
      - "/etc/updatecli/updatecli-compose.yaml"
      - "--experimental"
  agentrelay:
    # -- Repository for the AgentRelay image (Udash server running without authentication, cluster-internal only).
    repository: ghcr.io/updatecli/udash
    # -- Image pull policy for the AgentRelay image.
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: v0.15.0@sha256:4030ba7489e8ec8462028638a3ed92b94ba97deeb13013fd22cd0a11e4e4bd7a
    # -- Command override for the AgentRelay container.
    command:
      - "udash"
    # -- Arguments for the AgentRelay container.
    args:
      - "server"
      - "start"

# -- Secrets for pulling images from private registries.
imagePullSecrets: []
# -- Override for the chart name used in resource names.
nameOverride: ""
# -- Full override for the chart name used in resource names.
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template.
  name: ""

configMap:
  # -- The name of the ConfigMap used to store agent configuration files. If not set, a name is generated using the fullname template.
  name: ""
  # -- Annotations to add to the ConfigMap.
  annotations: {}

secrets:
  # -- The name of the Secret used to store credentials. If not set, a name is generated using the fullname template.
  name: ""
  ## agent defines the global agents configuration
  agent:
    # -- Annotations to add to the agent Secret.
    annotations: {}
    # -- Map of environment variables injected into every agent CronJob container (e.g. GITHUB_TOKEN). Values are stored in a Secret.
    environments: {}
    #  "GITHUB_ACTOR": "GitHub username"
    #  "GITHUB_TOKEN": "GitHub PAT"
  database:
    # -- Annotations to add to the database Secret.
    annotations: {}
    stringdata:
      # -- PostgreSQL connection URI used by the AgentRelay to store Updatecli reports.
      uri: postgres://postgres:5432/udash?sslmode=disable

# -- Annotations to add to all pods.
podAnnotations: {}
# -- Pod-level security context.
podSecurityContext: {}
# fsGroup: 2000

# -- Container-level security context.
securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# -- Resource requests and limits for all containers. Ref: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

autoscaling:
  # -- Enable Horizontal Pod Autoscaler.
  enabled: false
  # -- Minimum number of replicas.
  minReplicas: 1
  # -- Maximum number of replicas.
  maxReplicas: 100
  # -- Target CPU utilization percentage for autoscaling.
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  # -- Enable a PersistentVolumeClaim to persist the Updatecli tmp folder (`/tmp/updatecli`) across executions. One PVC is created per agent CronJob and per Argo workflow entry.
  enabled: false
  # -- Storage class name for the PersistentVolumeClaim. Leave empty to use the cluster default.
  storageClassName: ""
  # -- Access modes for the PersistentVolumeClaim.
  accessModes:
    - ReadWriteOnce
  # -- Size of the PersistentVolumeClaim.
  size: 1Gi
  # -- Annotations to add to the PersistentVolumeClaim.
  annotations: {}

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}

service:
  # -- Kubernetes Service type.
  type: ClusterIP
  # -- Service port.
  port: 80

# -- Default cron schedule for all agent CronJobs. Individual agents can override this with their own `schedule` field.
defaultSchedule: "0 * * * *"

# -- Default Updatecli compose configuration file mounted at `/etc/updatecli/updatecli-compose.yaml` in each agent CronJob. Can be overridden per agent.
# @default -- See values.yaml
defaultComposeFile: |
  policies:
    - name: Update Updatecli policies
      policy: ghcr.io/updatecli/policies/autodiscovery/all
      values:
        - /etc/updatecli/scm.yaml

# -- Default Udash connection configuration injected into each agent at `/home/updatecli/.config/updatecli/udash.json`. Can be overridden per agent.
# @default -- See values.yaml
defaultUdashConfig: |
  {
    "Auths": {
      "agentrelay": {
        "Api":"http://agentrelay/api",
        "URL":"http://localhost:3030"
      }
    },
    "Default":"agentrelay"
  }

# -- Map of named agents. Each entry creates a dedicated CronJob that runs Updatecli on the given schedule.
# @default -- `{}` (no agents created by default)
# agents:
#   "default":
#     # -- Cron schedule for this agent. Defaults to `defaultSchedule`.
#     schedule: "*/30 * * * *"
#     # -- Values files mounted into the agent at `/etc/updatecli/values.d/<name>`.
#     valuesFiles:
#       scm.yaml: |
#         scm:
#           enabled: true
#           user: updatecli
#           owner: updatecli
#           repository: updatecli
#           branch: main
#     # -- Updatecli compose file for this agent. Defaults to `defaultComposeFile`.
#     composeFile: |
#       policies:
#         - name: Update Updatecli policies
#           policy: ghcr.io/updatecli/policies/updatecli/autodiscovery/all:0.5.0
#           values:
#             - /etc/updatecli/scm.yaml
#     # -- Udash config for this agent. Defaults to `defaultUdashConfig`.
#     defaultUdashConfig: |
#       {
#         "Auths": {
#           "agentrelay": {
#             "Api":"http://agentrelay/api",
#             "URL":"http://localhost:3030"
#           }
#         },
#         "Default":"agentrelay"
#       }

# -- List of Git repositories to monitor via Argo CronWorkflows. Requires Argo Workflows to be installed in the cluster. Each entry creates an `argoproj.io/v1alpha1 CronWorkflow`.
# @default -- `[]` (no workflows created by default)
